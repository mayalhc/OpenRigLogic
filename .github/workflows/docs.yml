name: Deploy MkDocs

on:
  push:
    branches:
      - gh-pages-source
    paths:
      - 'docs/wiki/**'
      - 'docs/mkdocs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - run: pip install mkdocs

      - run: mkdocs gh-deploy --force --config-file docs/mkdocs.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}