name: Check code formatting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  format-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install clang-format 22
      run: |
        # Download and run the official LLVM installation script for version 22
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22
        # Install the specific clang-format package for version 22
        sudo apt-get install -y clang-format-22

    - name: Verify clang-format version
      run: clang-format-22 --version

    - name: Run Format Check
      run: |
        TARGET_DIRS="benchmarks src include examples tests"
        # Enforce styling using the exact same version 22 engine
        find $TARGET_DIRS -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" -o -name "*.cc" \) \
          -exec clang-format-22 --dry-run --Werror --style=file {} +
