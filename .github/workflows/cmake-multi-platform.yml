name: Build OpenRigLogic Python (Complete Addon Bundle)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build RigLogic & DNA on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup MSVC Compiler Env
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SWIG
        shell: pwsh
        run: |
          choco install swig -y --no-progress
          swig -version

      - name: Configure CMake
        shell: pwsh
        run: |
          $pythonDir = Split-Path (Get-Command python).Source
          
          # [핵심 수정] ON 대신 "3.13" 버젼 문자열을 직접 주입하여 내부 find_package(Python3 3.13 ...) 에러를 완벽하게 회피합니다.
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DRL_BUILD_PYTHON_WRAPPER="3.13" `
            -DRL_BUILD_TESTS=OFF `
            -DRL_BUILD_BENCHMARKS=OFF `
            -DRL_BUILD_EXAMPLES=OFF `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_CXX_FLAGS="/EHsc /W0 /std:c++17 /MD /D_SWIG_NO_THREAD_FOR_PYTHON" `
            -DPython_EXECUTABLE="$pythonDir\python.exe" `
            -DPython_ROOT_DIR="$pythonDir"

      - name: Build Component Modules
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 4

      - name: Gather and Package All MetaHuman Libraries
        shell: powershell
        run: |
          # 1. 최종 배포 규격용 플랫 폴더 생성
          New-Item -ItemType Directory -Force -Path "meta_rig_logic"
          New-Item -ItemType Directory -Force -Path "meta_rig_logic/lib"
          
          # 2. 빌드 폴더 내 생성된 모든 C++ 바이너리 (.pyd 및 .dll)를 이름 가리지 않고 전수 수집
          Get-ChildItem "build" -Recurse -Include *.pyd, *.dll -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination "meta_rig_logic/lib/" -Force
              Write-Host "[✓] Collected Binary: $($_.Name)"
          }
          
          # 3. SWIG가 자동 생성한 모든 파이썬 인터페이스 스크립트 (.py) 누락 없이 전수 수집
          Get-ChildItem "build" -Recurse -Filter *.py -ErrorAction SilentlyContinue | ForEach-Object {
              if ($_.Name -notlike "*ctest*" -and $_.Name -notlike "*bwrap*") {
                  Copy-Item -Path $_.FullName -Destination "meta_rig_logic/lib/" -Force
                  Write-Host "[✓] Collected Script: $($_.Name)"
              }
          }

          # 4. 블렌더 5.1에서 애드온을 원클릭으로 정식 인식시키기 위한 확장 매니페스트 배치
          $manifest_content = @"
          schema_version = "1.0.0"
          id = "meta_rig_logic"
          version = "1.0.0"
          name = "MetaRigLogic Tools"
          tagline = "MetaHuman DNA and RigLogic Core tools inside Blender 5.1"
          maintainer = "Epic Games / Custom Build"
          type = "add-on"
          website = "https://github.com"

          [blender_version]
          min = "5.1.0"

          [platforms]
          windows-x64 = "*"
          "@
          
          Set-Content -Path "meta_rig_logic/blender_manifest.toml" -Value $manifest_content -Encoding utf8

          # 5. 블렌더 구동 시 lib 안의 파일들을 자동으로 OS 환경에 맵핑해 줄 깔끔한 __init__.py 파일 주입
          $init_content = @"
          import sys
          import os

          def register():
              current_dir = os.path.dirname(__file__)
              lib_path = os.path.join(current_dir, "lib")
              if hasattr(os, "add_dll_directory"):
                  try: os.add_dll_directory(lib_path)
                  except: pass
              paths_to_add = [current_dir, lib_path]
              for p in paths_to_add:
                  if p not in sys.path: sys.path.insert(0, p)
              print("[-] MetaRigLogic Runtime Modules successfully system-linked.")

          def unregister():
              pass
          "@
          
          Set-Content -Path "meta_rig_logic/__init__.py" -Value $init_content -Encoding utf8

      - name: Zip Addon Package (Strict Flat Structure)
        shell: powershell
        run: |
          Compress-Archive -Path "meta_rig_logic" -DestinationPath "meta_rig_logic_blender5.1_package.zip" -Force

      - name: Upload Addon Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetaRigLogic-Blender5.1-Addon
          path: meta_rig_logic_blender5.1_package.zip
