name: Build OpenRigLogic Python (Complete Addon Bundle)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build RigLogic & DNA on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup MSVC Compiler Env
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install SWIG
        shell: pwsh
        run: |
          choco install swig -y --no-progress
          swig -version

      - name: Configure CMake
        shell: pwsh
        run: |
          $pythonDir = Split-Path (Get-Command python).Source
          
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DRL_BUILD_PYTHON_WRAPPER="3.13" `
            -DRL_BUILD_TESTS=OFF `
            -DRL_BUILD_BENCHMARKS=OFF `
            -DRL_BUILD_EXAMPLES=OFF `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_CXX_FLAGS="/EHsc /W0 /std:c++17 /MD /D_SWIG_NO_THREAD_FOR_PYTHON" `
            -DPython_EXECUTABLE="$pythonDir\python.exe" `
            -DPython_ROOT_DIR="$pythonDir"

      - name: Build Component Modules
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel 4

      # [완벽 수정] 문법 에러를 유발하던 파워쉘 블록 구문을 모두 단 한 줄짜리 단순 명령어로 전면 개편했습니다.
      # 이중 안전장치를 통해 모든 파일(.pyd, .dll, .py)이 유실 없이 취합됩니다.
      - name: Gather and Package All MetaHuman Libraries
        shell: powershell
        run: |
          # 1. 수집용 배포 폴더 구조 보장 생성
          New-Item -ItemType Directory -Force -Path "meta_rig_logic"
          New-Item -ItemType Directory -Force -Path "meta_rig_logic/lib"
          
          # 2. 파워쉘 반복문({ }) 구조를 없애고 단순 카피 명령으로 .pyd와 .dll 전수 복사
          Copy-Item -Path "build\**\*.pyd" -Destination "meta_rig_logic/lib\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "build\**\*.dll" -Destination "meta_rig_logic/lib\" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "build\**\*.py" -Destination "meta_rig_logic/lib\" -Force -ErrorAction SilentlyContinue
          
          # 3. 테스트 성격의 파일이 섞여 들어왔을 경우를 대비해 불필요한 내부 파일 일괄 제거
          Remove-Item -Path "meta_rig_logic/lib/*ctest*" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "meta_rig_logic/lib/*bwrap*" -Force -ErrorAction SilentlyContinue

          # 4. 파워쉘 블록 문법 대신 단일 에코 라인 출력을 활용해 blender_manifest.toml 안전하게 작성
          "schema_version = `"1.0.0`"" | Set-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "id = `"meta_rig_logic`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "version = `"1.0.0`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "name = `"MetaRigLogic Tools`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "tagline = `"MetaHuman DNA and RigLogic tools inside Blender 5.1`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "maintainer = `"Epic Games / Custom Build`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "type = `"add-on`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "website = `"https://github.com`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "`n[blender_version]" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "min = `"5.1.0`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "`n[platforms]" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8
          "windows-x64 = `"*`"" | Add-Content -Path "meta_rig_logic/blender_manifest.toml" -Encoding utf8

          # 5. 블렌더 전용 애드온 초기화 파일인 __init__.py 안전하게 작성
          "import sys, os" | Set-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "def register():" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "    current_dir = os.path.dirname(__file__)" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "    lib_path = os.path.join(current_dir, `"lib`")" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "    if hasattr(os, `"add_dll_directory`"):" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "        try: os.add_dll_directory(lib_path)" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "        except: pass" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "    paths_to_add = [current_dir, lib_path]" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "    for p in paths_to_add:" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "        if p not in sys.path: sys.path.insert(0, p)" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "    print(`"[-] MetaRigLogic Runtime Modules successfully system-linked.`")" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "def unregister():" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8
          "    pass" | Add-Content -Path "meta_rig_logic/__init__.py" -Encoding utf8

      - name: Zip Addon Package (Strict Flat Structure)
        shell: powershell
        run: |
          Compress-Archive -Path "meta_rig_logic" -DestinationPath "meta_rig_logic_blender5.1_package.zip" -Force

      - name: Upload Addon Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetaRigLogic-Blender5.1-Addon
          path: meta_rig_logic_blender5.1_package.zip
